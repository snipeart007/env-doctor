    cuda_version: "12.1"
    python_version: ">=3.10"
    confidence: "production-tested"
    description: "The gold standard for high-throughput inference on Hopper architecture."
    packages:
      - name: "torch"
        version: "2.4.0"
      - name: "transformers"
        version: "4.42.3"
      - name: "vllm"
        version: "0.5.1"
      - name: "flash-attn"
        version: "2.5.9"
      - name: "tokenizers"
        version: "0.19.1"

  - name: "RTX-3090-Training-Stack"
    cuda_version: "11.8"
    python_version: ">=3.9"
    confidence: "stable"
    description: "Optimized for Ampere consumer cards with slightly older CUDA."
    packages:
      - name: "torch"
        version: "2.1.2"
      - name: "transformers"
        version: "4.36.2"
      - name: "accelerate"
        version: "0.26.0"
      - name: "bitsandbytes"
        version: "0.41.3"
      - name: "peft"
        version: "0.7.1"
